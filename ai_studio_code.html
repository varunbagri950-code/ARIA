<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#08060f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22ARIA%20AI%22,%22short_name%22:%22ARIA%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#08060f%22,%22theme_color%22:%22#08060f%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/2103/2103633.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

<title>ARIA — Personal AI</title>

<!-- Existing Styles (Keep your original CSS here) -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --void:#08060f;--deep:#110d1e;--surface:#1a1530;
  --violet:#7c3aed;--vglow:#9d5cff;--rose:#f43f7a;--rose-s:#ff6b9d;
  --green:#4ade80;--pearl:#e8e0ff;--muted:#6b5f8a;
  --glass:rgba(124,58,237,0.08);--gb:rgba(157,92,255,0.18);
}
html,body{height:100%;background:var(--void);color:var(--pearl);font-family:'Space Grotesk',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;user-select:none}
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3}
.b1{width:500px;height:500px;background:var(--violet);top:-150px;left:-100px;animation:d1 8s ease-in-out infinite alternate}
.b2{width:400px;height:400px;background:var(--rose);bottom:-100px;right:-80px;animation:d2 10s ease-in-out infinite alternate}
@keyframes d1{to{transform:translate(30px,40px)}}
@keyframes d2{to{transform:translate(-20px,-30px)}}
.page{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;transition:opacity .4s,transform .4s;padding:0 24px}
.page.hidden{opacity:0;pointer-events:none;transform:translateY(20px)}
#setupPage{justify-content:center}
.setup-card{background:rgba(26,21,48,.97);border:1px solid var(--gb);border-radius:28px;padding:36px 28px;max-width:400px;width:100%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.setup-logo{font-family:'Syne',sans-serif;font-size:2.8rem;font-weight:800;background:linear-gradient(135deg,var(--vglow),var(--rose-s));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px;margin-bottom:4px}
.setup-step{background:rgba(124,58,237,.08);border:1px solid var(--gb);border-radius:16px;padding:16px;margin-bottom:12px;text-align:left}
.step-num{font-size:.6rem;color:var(--vglow);letter-spacing:2px;margin-bottom:4px;font-weight:600}
.step-text{font-size:.82rem;color:var(--pearl);line-height:1.5}
.key-input{width:100%;background:rgba(124,58,237,.06);border:1px solid var(--gb);border-radius:14px;padding:14px 16px;color:var(--pearl);font-family:'Space Grotesk',sans-serif;font-size:.85rem;outline:none;margin-bottom:6px}
.activate-btn{width:100%;padding:15px;border:none;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,var(--violet),var(--rose));color:#fff;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;letter-spacing:2px}
#mainPage{justify-content:space-between;padding-top:0}
.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:20px 0 8px;max-width:400px}
.app-name{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--vglow),var(--rose-s));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px}
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;width:100%;max-width:400px}
.sphere-wrap{position:relative;width:170px;height:170px}
.sphere{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 38% 32%,rgba(255,255,255,.25) 0%,var(--violet) 30%,#3b1878 65%,var(--void) 100%);box-shadow:0 0 40px rgba(124,58,237,.5);transition:all .3s}
.sphere.listening{box-shadow:0 0 50px rgba(244,63,122,.6)}
.sphere.speaking{animation:spk-pulse 1s ease-in-out infinite alternate}
@keyframes spk-pulse{from{transform:scale(1)}to{transform:scale(1.04)}}
.vbars{position:absolute;bottom:-48px;left:50%;transform:translateX(-50%);display:flex;align-items:flex-end;gap:4px;height:38px;opacity:0;transition:opacity .3s}
.vbars.active{opacity:1}
.bar{width:4px;background:linear-gradient(to top,var(--violet),var(--rose-s));border-radius:2px;height:4px;animation:wv .6s ease-in-out infinite alternate}
@keyframes wv{to{height:34px}}
.bottom{width:100%;max-width:400px;padding:16px 0 40px;display:flex;flex-direction:column;align-items:center;gap:16px}
.mic-btn{width:78px;height:78px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.9rem;background:linear-gradient(135deg,var(--violet),var(--rose));box-shadow:0 8px 32px rgba(124,58,237,.5)}
.mic-btn.listening{animation:mpulse 1s ease-in-out infinite alternate}
@keyframes mpulse{to{box-shadow:0 8px 60px rgba(244,63,122,.8)}}
.spk-bubble{position:fixed;bottom:175px;left:50%;transform:translateX(-50%);background:rgba(17,13,30,.92);border:1px solid var(--gb);border-radius:18px;padding:14px 18px;max-width:320px;width:calc(100% - 48px);font-size:.82rem;line-height:1.6;color:var(--pearl);text-align:center;backdrop-filter:blur(20px);opacity:0;transition:opacity .3s;pointer-events:none}
.spk-bubble.show{opacity:1}
</style>
</head>
<body>

<div class="ambient">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
</div>

<div class="spk-bubble" id="spkBubble"></div>

<!-- SETUP PAGE -->
<div class="page" id="setupPage">
  <div class="setup-card">
    <div class="setup-logo">ARIA</div>
    <div class="setup-step">
      <div class="step-num">INTERNET-ENABLED AI</div>
      <div class="step-text">Paste your Gemini API Key to activate search and voice.</div>
    </div>
    <input class="key-input" id="apiKeyInput" type="password" placeholder="AIzaSy..."/>
    <button class="activate-btn" onclick="saveKey()">⚡ ACTIVATE ARIA</button>
  </div>
</div>

<!-- MAIN PAGE -->
<div class="page hidden" id="mainPage">
  <div class="topbar">
    <div class="app-name">ARIA</div>
    <div class="pill"><div class="sdot"></div><span>ONLINE</span></div>
  </div>

  <div class="center">
    <div class="sphere-wrap">
      <div class="sphere" id="sphere"></div>
      <div class="vbars" id="vbars">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
    </div>
    <div style="text-align:center">
      <h2 id="stateTitle">Aria</h2>
      <p id="stateSub" style="font-size:0.8rem; color:var(--muted)">Connected to Internet</p>
    </div>
  </div>

  <div class="bottom">
    <button class="mic-btn" id="micBtn" onclick="toggleListen()">🎤</button>
    <div id="hintText" style="font-size:0.7rem; color:var(--muted)">TAP TO SPEAK</div>
  </div>
</div>

<script>
let API_KEY = localStorage.getItem('aria_gemini_key') || '';
let memory = JSON.parse(localStorage.getItem('aria_memory') || '{}');
let isSpeaking = false, isListening = false;
let recognition = null;

// UI Elements
const sphere = document.getElementById('sphere');
const micBtn = document.getElementById('micBtn');
const vbars = document.getElementById('vbars');
const spkBubble = document.getElementById('spkBubble');

function saveKey() {
    const val = document.getElementById('apiKeyInput').value.trim();
    if(val.length > 20) {
        API_KEY = val;
        localStorage.setItem('aria_gemini_key', val);
        location.reload();
    }
}

// ── THE INTERNET SEARCH LOGIC ──────────────────────
async function askAria(text) {
    updateUI('thinking');
    
    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: text }] }],
                // This activates the Google Search "Internet" capability
                tools: [{ google_search_retrieval: {} }] 
            })
        });

        const data = await response.json();
        // Extract text from standard response or tool response
        let aiText = data.candidates[0].content.parts[0].text || "I found some info but couldn't summarize it.";
        speak(aiText);
    } catch (err) {
        speak("I'm having trouble connecting to my brain right now.");
        updateUI('idle');
    }
}

// ── VOICE & SPEECH ────────────────────────────────
function speak(text) {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text.replace(/[*#]/g, ''));
    utter.onstart = () => updateUI('speaking', text);
    utter.onend = () => updateUI('idle');
    window.speechSynthesis.speak(utter);
}

function initSpeech() {
    const SpeechSDK = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechSDK();
    recognition.onstart = () => updateUI('listening');
    recognition.onresult = (e) => askAria(e.results[0][0].transcript);
    recognition.onend = () => { if(!isSpeaking) updateUI('idle'); };
}

function toggleListen() {
    if(!recognition) initSpeech();
    window.speechSynthesis.cancel();
    recognition.start();
}

function updateUI(state, text = "") {
    sphere.className = "sphere " + (state === 'listening' ? 'listening' : state === 'speaking' ? 'speaking' : '');
    vbars.classList.toggle('active', state === 'speaking');
    spkBubble.classList.toggle('show', state === 'speaking');
    spkBubble.textContent = text;
    document.getElementById('stateTitle').textContent = state.toUpperCase();
}

// ── PWA SERVICE WORKER ───────────────────────────
if ('serviceWorker' in navigator) {
    const swCode = `self.addEventListener('fetch', function(e) { e.respondWith(fetch(e.request)); });`;
    const blob = new Blob([swCode], {type: 'text/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl);
}

window.onload = () => {
    if (API_KEY) document.getElementById('mainPage').classList.remove('hidden'), document.getElementById('setupPage').classList.add('hidden');
};
</script>
</body>
</html>
